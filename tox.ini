[tox]
envlist = py310, py311, py312, py313, py314, lint, typecheck
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    hypothesis>=6.0.0
    numpy>=1.21.0
    scipy>=1.7.0
commands =
    pytest tests/python/ -v --tb=short -m "fast and not cuda and not distributed" \
        --cov=python/pynerve --cov-branch --cov-report=term-missing --cov-fail-under=80
changedir = {toxinidir}

[testenv:lint]
deps = ruff>=0.6.0
commands =
    ruff check python/pynerve/ tests/python/ tools/
    ruff format --check python/pynerve/ tests/python/ tools/

[testenv:typecheck]
deps =
    mypy>=1.8.0
    numpy>=1.21.0
commands =
    mypy python/pynerve/

[testenv:py310]
deps =
    {[testenv]deps}
basepython = python3.10

[testenv:py311]
deps =
    {[testenv]deps}
basepython = python3.11

[testenv:py312]
deps =
    {[testenv]deps}
basepython = python3.12

[testenv:py313]
deps =
    {[testenv]deps}
basepython = python3.13

[testenv:py314]
deps =
    {[testenv]deps}
basepython = python3.14
