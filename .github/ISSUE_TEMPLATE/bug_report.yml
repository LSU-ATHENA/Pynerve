name: Bug Report
description: Report a bug in pynerve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us diagnose and fix the issue quickly.
  - type: input
    id: version
    attributes:
      label: Pynerve Version
      placeholder: "1.0.4"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11.4"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Provide a minimal code snippet that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Error Output
      description: Paste the full traceback or error message.
      render: text
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: GPU model, CUDA version, dataset size, or anything else relevant.
