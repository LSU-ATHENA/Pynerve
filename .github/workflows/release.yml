name: release

on:
  push:
    tags:
      - 'v*'

env:
  TWINE_USERNAME: __token__

jobs:
  build-sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - run: python -m pip install -U pip build twine

      - name: Copy README and LICENSE for sdist
        run: cp README.md python/README.md && cp LICENSE python/LICENSE

      - name: Build sdist
        run: python -m build --sdist python/ --outdir dist/

      - name: Upload sdist to TestPyPI
        env:
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: python -m twine upload --repository testpypi dist/* --skip-existing

      - name: Verify TestPyPI install
        run: |
          python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pynerve==$(python -c "import sys; sys.path.insert(0,'python'); from pynerve import __version__; print(__version__)")

      - name: Upload sdist to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    needs: [build-sdist]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS: auto64
          CIBW_SKIP: "*-musllinux_*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_ENVIRONMENT: "CMAKE_ARGS='-DBUILD_PYTHON=ON -DBUILD_TESTS=OFF -DENABLE_CUDA=OFF -DENABLE_PYTORCH=ON'"
          CIBW_BEFORE_BUILD: "python -m pip install scikit-build-core pybind11 numpy torch"

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  upload-wheels:
    needs: [build-wheels]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install -U pip twine

      - name: Upload wheels to TestPyPI
        env:
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: python -m twine upload --repository testpypi *.whl --skip-existing

      - name: Upload wheels to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload *.whl

  create-release:
    needs: [upload-wheels]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate ${PREV_TAG}..HEAD 2>/dev/null || echo "Initial release" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: ${{ steps.release_notes.outputs.notes }}
