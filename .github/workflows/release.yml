name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to build from'
        required: true
        default: 'main'
        type: string

env:
  TWINE_USERNAME: __token__

jobs:
  build-sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -U pip build twine
      - name: Build sdist
        run: python -m build --sdist . --outdir dist/
      - name: Upload sdist to TestPyPI
        continue-on-error: true
        env:
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: python -m twine upload --repository testpypi dist/* --skip-existing
      - name: Verify TestPyPI install
        continue-on-error: true
        run: |
          python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pynerve==$(python -c "import sys; sys.path.insert(0,'python'); from pynerve import __version__; print(__version__)")
      - name: Upload sdist to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels-linux:
    needs: [build-sdist]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Build manylinux wheel
        run: |
          pyver_short=$(echo "${{ matrix.python }}" | tr -d '.')
          docker run --rm -v $(pwd):/io \
            quay.io/pypa/manylinux_2_28_x86_64 bash -c "
              export PATH=/opt/python/cp${pyver_short}-cp${pyver_short}/bin:\$PATH
              pip install scikit-build-core pybind11 numpy
              pip wheel /io -w /io/wheelhouse/ --no-deps
              auditwheel repair /io/wheelhouse/pynerve*.whl -w /io/dist/
            "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.python }}
          path: dist/*.whl

  build-wheels-macos:
    needs: [build-sdist]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: brew install libomp 2>/dev/null || true
      - run: python -m pip install -U pip
      - name: Build wheel
        run: python -m pip wheel . --wheel-dir dist/ --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.python }}
          path: dist/*.whl

  build-wheels-windows:
    needs: [build-sdist]
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -U pip
      - name: Build wheel
        run: python -m pip wheel . --wheel-dir dist/ --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python }}
          path: dist/*.whl

  upload-wheels:
    needs: [build-wheels-linux, build-wheels-macos, build-wheels-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4.1
        with:
          pattern: wheels-*
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip twine
      - name: Upload wheels to TestPyPI
        continue-on-error: true
        env:
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: python -m twine upload --repository testpypi *.whl --skip-existing
      - name: Upload wheels to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload *.whl

  create-release:
    needs: [upload-wheels]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate ${PREV_TAG}..HEAD 2>/dev/null || echo "Initial release" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: ${{ steps.release_notes.outputs.notes }}
