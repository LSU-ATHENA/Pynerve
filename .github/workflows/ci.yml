name: pynerve-ci

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  CMAKE_GENERATOR: Ninja
  NERVE_TEST_RETRIES: 1

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -U pip ruff mypy pyright
      - run: python tools/static_analysis.py --language python --required
      - run: python -m pyright python/pynerve/ || echo "pyright warnings (non-blocking)"
      - name: Verify .pyi stubs are up to date
        run: python tools/generate_pyi.py --check || echo "stub check skipped (torch not available)"
      - name: Check C++ formatting
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: clang-format --all-files

  version-compat:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.target }}
          cache: pip
      - run: python -m pip install -U pip ruff
      - name: Check syntax compatibility with Python ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
        run: python -m ruff check python/pynerve/ --target-version py${TARGET//.}

  test-coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -U pip pytest hypothesis pytest-cov pytest-asyncio numpy scipy psutil scikit-learn numba diskcache networkx matplotlib pybind11 scikit-build-core
      - run: python -m pip install -U gudhi ripser dionysus tensorboard 2>/dev/null || true
      - run: python -m pip install -U torch --index-url https://download.pytorch.org/whl/cpu
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_PYTHON=ON -DENABLE_CUDA=OFF -DENABLE_PYTORCH=ON -DCMAKE_PREFIX_PATH=$(python -c "import torch; print(torch.utils.cmake_prefix_path)") -DPython_EXECUTABLE=$(which python) -DPython3_EXECUTABLE=$(which python)
      - run: cmake --build build --target pynerve_internal algorithms_bindings nerve_torch_internal --parallel
      - run: cp build/python/pynerve_internal*.so python/ 2>/dev/null; cp build/python/algorithms_bindings*.so python/ 2>/dev/null; cp build/python/nerve_torch_internal*.so python/ 2>/dev/null
      - run: python tools/test_matrix.py --label cpu --output build/test-matrix-cpu.json
      - run: python -m pytest tests/python/ --cov=python/pynerve --cov-branch --cov-report=term-missing
        continue-on-error: true
      - run: python -m coverage report --fail-under=5

  simd-modes:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        simd: [scalar, sse41, avx2, auto, avx512]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis ninja numpy scipy
      - name: Detect AVX-512 support
        id: avx512
        run: |
          AVX512=0
          grep -q "avx512" /proc/cpuinfo && AVX512=1 || true
          echo "supported=$AVX512" >> $GITHUB_OUTPUT
      - name: Detect SSE4.1 support
        id: sse41
        run: |
          SSE41=0
          grep -q "sse4_1" /proc/cpuinfo && SSE41=1 || true
          echo "supported=$SSE41" >> $GITHUB_OUTPUT
      - name: Detect AVX2 support
        id: avx2
        run: |
          AVX2=0
          grep -q "avx2" /proc/cpuinfo && AVX2=1 || true
          echo "supported=$AVX2" >> $GITHUB_OUTPUT
      - name: Skip unsupported backend
        if: |
          (matrix.simd == 'avx512' && steps.avx512.outputs.supported != '1') ||
          (matrix.simd == 'sse41' && steps.sse41.outputs.supported != '1') ||
          (matrix.simd == 'avx2' && steps.avx2.outputs.supported != '1')
        run: |
          echo "::notice::${{ matrix.simd }} instructions not available on this runner; skipped"
      - name: Configure (${{ matrix.simd }})
        if: |
          (matrix.simd != 'avx512' || steps.avx512.outputs.supported == '1') &&
          (matrix.simd != 'sse41' || steps.sse41.outputs.supported == '1') &&
          (matrix.simd != 'avx2' || steps.avx2.outputs.supported == '1')
        run: |
          EXTRA_FLAGS=""
          if [ "${{ matrix.simd }}" = "avx512" ]; then
            EXTRA_FLAGS="-DNERVE_ENABLE_AVX512_COMPONENTS=ON"
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON=OFF \
            -DENABLE_CUDA=OFF \
            -DNERVE_SIMD=${{ matrix.simd }} \
            ${EXTRA_FLAGS}
      - name: Build SIMD primitive regression test
        if: |
          (matrix.simd != 'avx512' || steps.avx512.outputs.supported == '1') &&
          (matrix.simd != 'sse41' || steps.sse41.outputs.supported == '1') &&
          (matrix.simd != 'avx2' || steps.avx2.outputs.supported == '1')
        run: |
          cmake --build build --target nerve_cpp_simd_primitive_regressions --parallel 2>&1 | tail -20
      - name: Run SIMD primitive regression test
        if: |
          (matrix.simd != 'avx512' || steps.avx512.outputs.supported == '1') &&
          (matrix.simd != 'sse41' || steps.sse41.outputs.supported == '1') &&
          (matrix.simd != 'avx2' || steps.avx2.outputs.supported == '1')
        run: |
          ./build/tests/nerve_cpp_simd_primitive_regressions 2>&1
      - name: Full build (all targets)
        if: |
          (matrix.simd != 'avx512' || steps.avx512.outputs.supported == '1') &&
          (matrix.simd != 'sse41' || steps.sse41.outputs.supported == '1') &&
          (matrix.simd != 'avx2' || steps.avx2.outputs.supported == '1')
        run: |
          cmake --build build --parallel 2>&1 | tail -10
      - name: Run CPU/generated tests via ctest
        if: |
          (matrix.simd != 'avx512' || steps.avx512.outputs.supported == '1') &&
          (matrix.simd != 'sse41' || steps.sse41.outputs.supported == '1') &&
          (matrix.simd != 'avx2' || steps.avx2.outputs.supported == '1')
        run: |
          ctest --test-dir build -L "cpu|generated" --output-on-failure --parallel 2

  valgrind:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        simd: [scalar, auto]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev valgrind
      - run: python -m pip install -U pip pytest
      - name: Configure (Debug, ${{ matrix.simd }})
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON=OFF \
            -DENABLE_CUDA=OFF \
            -DNERVE_SIMD=${{ matrix.simd }}
      - name: Build SIMD primitive regression test
        run: |
          cmake --build build --target nerve_cpp_simd_primitive_regressions --parallel 2>&1 | tail -20
      - name: Run under Valgrind memcheck
        run: |
          valgrind --tool=memcheck --leak-check=full \
            --show-leak-kinds=definite \
            --errors-for-leak-kinds=definite \
            --error-exitcode=1 \
            --num-callers=50 \
            ./build/tests/nerve_cpp_simd_primitive_regressions 2>&1

  ubsan:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        simd: [scalar, auto]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis ninja numpy scipy
      - name: Configure (Debug, UBSan, ${{ matrix.simd }})
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=undefined -fno-sanitize=alignment -fno-sanitize-recover=undefined" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined" \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON=OFF \
            -DENABLE_CUDA=OFF \
            -DNERVE_SIMD=${{ matrix.simd }}
      - name: Full build (all targets) under UBSan
        run: |
          cmake --build build --parallel 2>&1 | tail -10
      - name: Run CPU/generated tests via ctest (UBSan)
        run: |
          ctest --test-dir build -L "cpu|generated" --output-on-failure --parallel 2

  asan:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        simd: [scalar, auto]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest
      - name: Configure (Debug, ASan, ${{ matrix.simd }})
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer -fno-sanitize-recover=address" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON=OFF \
            -DENABLE_CUDA=OFF \
            -DNERVE_SIMD=${{ matrix.simd }}
      - name: Build SIMD primitive regression test
        run: |
          cmake --build build --target nerve_cpp_simd_primitive_regressions --parallel 2>&1 | tail -20
      - name: Run SIMD primitive regression test (ASan + leak detection)
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: |
          ./build/tests/nerve_cpp_simd_primitive_regressions 2>&1

  tsan:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        simd: [scalar, auto]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis ninja numpy scipy
      - name: Configure (Debug, TSan, ${{ matrix.simd }})
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-sanitize-recover=thread" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON=OFF \
            -DENABLE_CUDA=OFF \
            -DNERVE_SIMD=${{ matrix.simd }}
      - name: Full build (all targets) under TSan
        run: |
          cmake --build build --parallel 2>&1 | tail -10
      - name: Run CPU/generated tests via ctest (TSan)
        env:
          TSAN_OPTIONS: halt_on_error=1 suppressions=${{ github.workspace }}/tsan_suppressions.txt
        run: |
          ctest --test-dir build -L "cpu|generated" --output-on-failure --parallel 2

  simd-arm:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        simd: [scalar, neon]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis ninja numpy scipy
      - name: Detect SVE support
        id: sve
        run: |
          SVE=0
          grep -q "sve" /proc/cpuinfo 2>/dev/null && SVE=1 || true
          echo "supported=$SVE" >> $GITHUB_OUTPUT
      - name: Configure (${{ matrix.simd }})
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON=OFF \
            -DENABLE_CUDA=OFF \
            -DNERVE_SIMD=${{ matrix.simd }}
      - name: Build SIMD primitive regression test
        run: |
          cmake --build build --target nerve_cpp_simd_primitive_regressions --parallel 2>&1 | tail -20
      - name: Run SIMD primitive regression test
        run: |
          ./build/tests/nerve_cpp_simd_primitive_regressions 2>&1
      - name: Full build (all targets)
        run: |
          cmake --build build --parallel 2>&1 | tail -10
      - name: Run CPU/generated tests via ctest
        run: |
          ctest --test-dir build -L "cpu|generated" --output-on-failure --parallel 2

  static-native:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y clang-tidy cppcheck ninja-build libeigen3-dev libomp-dev
      - run: python -m pip install pytest
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBUILD_TESTS=ON -DBUILD_PYTHON=OFF -DENABLE_CUDA=OFF
      - name: Static analyze full native build
        run: python tools/static_analysis.py --language cpp --build-dir build --required --clang-tidy-scope all

  cpu:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        build_type: [Debug, Release]
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - if: runner.os == 'Linux'
        run: sudo apt-get update || true && sudo apt-get install -y libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis ninja scikit-build-core pybind11 numpy scipy
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON -DBUILD_PYTHON=OFF -DENABLE_MPI=OFF
      - run: cmake --build build --parallel
      - if: matrix.shard == 0
        run: cmake --install build --prefix "$RUNNER_TEMP/pynerve-install"
      - if: matrix.shard == 0
        run: python tools/cpp_install_smoke.py --prefix "$RUNNER_TEMP/pynerve-install"
      - if: matrix.shard == 0 && matrix.os == 'ubuntu-24.04' && matrix.build_type == 'Release'
        run: python tools/cpp_install_smoke.py --prefix "$RUNNER_TEMP/pynerve-install" --header-sweep
      - run: python tools/run_tests.py --build-dir build --label cpu --label generated --shard-index ${{ matrix.shard }} --shard-count 4

  native-arch:
    # Use a pinned baseline on x86_64: heterogeneous GitHub runner
    # hardware may not support all instructions emitted by -march=native,
    # causing intermittent SIGILL.  ARM runners have consistent hardware
    # so -march=native is safe there.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - if: runner.os == 'Linux'
        run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis ninja scikit-build-core pybind11 numpy scipy
      - name: Configure (x86_64 pinned to x86-64-v3; ARM uses native)
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTS=ON -DBUILD_PYTHON=ON \
              -DENABLE_CUDA=OFF \
              -DCMAKE_CXX_FLAGS="-march=x86-64-v3 -mtune=generic"
          else
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTS=ON -DBUILD_PYTHON=ON \
              -DENABLE_CUDA=OFF \
              -DNERVE_NATIVE_ARCH=ON
          fi
      - run: cmake --build build --parallel
      - run: cmake --install build --prefix "$RUNNER_TEMP/pynerve-install"
      - run: cp -r python/pynerve "$RUNNER_TEMP/pynerve-install/pynerve"
      - run: python tools/cpp_install_smoke.py --prefix "$RUNNER_TEMP/pynerve-install"
      - run: python tools/install_smoke.py --prefix "$RUNNER_TEMP/pynerve-install"
      - run: ctest --test-dir build -L "cpu|generated|bindings" --output-on-failure --parallel 2

  python-bindings:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - uses: hendrikmuhs/ccache-action@v1.2
      - run: sudo apt-get update || true && sudo apt-get install -y libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis ninja scikit-build-core pybind11 numpy build
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_PYTHON=ON -DENABLE_CUDA=OFF -DPython_EXECUTABLE=${{ env.pythonLocation }}/bin/python -DPython3_EXECUTABLE=${{ env.pythonLocation }}/bin/python
      - run: cmake --build build --target pynerve_python_binding_smoke --parallel
      - run: cmake --install build --prefix "$RUNNER_TEMP/pynerve-install"
      - run: cp -r python/pynerve "$RUNNER_TEMP/pynerve-install/pynerve"
      - run: python tools/cpp_install_smoke.py --prefix "$RUNNER_TEMP/pynerve-install"
      - run: python tools/install_smoke.py --prefix "$RUNNER_TEMP/pynerve-install"
      - if: matrix.python == '3.11'
        run: cp README.md python/README.md
      - if: matrix.python == '3.11'
        run: python -m build --sdist python --outdir "$RUNNER_TEMP/pynerve-dist"
      - if: matrix.python == '3.11'
        run: python -m pip wheel "$RUNNER_TEMP/pynerve-dist"/pynerve-*.tar.gz --wheel-dir "$RUNNER_TEMP/pynerve-wheel-from-sdist" --no-deps
      - run: ctest --test-dir build -L "bindings" --output-on-failure --parallel 2

  torch-cpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: sudo apt-get update || true && sudo apt-get install -y clang-tidy cppcheck libeigen3-dev libomp-dev
      - run: python -m pip install -U pip pytest hypothesis numpy scipy ninja scikit-build-core pybind11 pytest-asyncio
      - name: Install latest PyTorch CPU
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: python tools/run_tests.py --python --label torch --label gradient --shard-index 0 --shard-count 4
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBUILD_TESTS=ON -DBUILD_PYTHON=ON -DENABLE_CUDA=OFF -DENABLE_PYTORCH=ON -DCMAKE_PREFIX_PATH=$(python -c "import torch; print(torch.utils.cmake_prefix_path)") -DPython_EXECUTABLE=${{ env.pythonLocation }}/bin/python -DPython3_EXECUTABLE=${{ env.pythonLocation }}/bin/python
      - run: cmake --build build --target pynerve_torch_binding_smoke --parallel
      - name: Static analyze Torch-native build
        run: python tools/static_analysis.py --language cpp --build-dir build --required --clang-tidy-scope all
      - run: cmake --install build --prefix "$RUNNER_TEMP/pynerve-install"
      - run: cp -r python/pynerve "$RUNNER_TEMP/pynerve-install/pynerve"
      - run: python tools/install_smoke.py --prefix "$RUNNER_TEMP/pynerve-install" --require-torch
      - run: ctest --test-dir build -R pynerve_torch_binding_smoke --output-on-failure

  mpi:
    runs-on: ubuntu-24.04
    env:
      OMPI_MCA_rmaps_base_oversubscribe: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update || true && sudo apt-get install -y ninja-build libeigen3-dev libomp-dev ccache openmpi-bin libopenmpi-dev
      - run: python -m pip install -U pip pytest hypothesis numpy scipy
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DENABLE_MPI=ON -DBUILD_PYTHON=OFF
      - run: cmake --build build --parallel
      - run: ctest --test-dir build -L "distributed|build|cpu" --output-on-failure --parallel 2

  gpu-smoke:
    # Fast GPU availability check — runs on every PR/push (~2 min).
    # Gates the full CUDA matrix behind a successful smoke test.
    # On schedule runs, skip smoke and go directly to full matrix.
    if: github.event_name != 'schedule'
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 10
    env:
      NERVE_TEST_CUDA: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: nvidia-smi
      - run: python -m pip install -U pip pytest ninja scikit-build-core pybind11 numpy
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DENABLE_CUDA=ON -DBUILD_PYTHON=OFF
      - run: cmake --build build --target nerve_cuda_smoke --parallel
      - run: ctest --test-dir build -R nerve_cuda_smoke --output-on-failure

  cuda-aware-mpi:
    needs: gpu-smoke
    if: |
      always() &&
      (needs.gpu-smoke.result == 'success' || needs.gpu-smoke.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: [self-hosted, linux, x64, gpu, mpi]
    env:
      NERVE_TEST_CUDA: "1"
      NERVE_TEST_CUDA_AWARE_MPI: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: nvidia-smi
      - name: Check CUDA version
        run: |
          CUDA_VER=$(nvcc --version | grep "release" | sed 's/.*release //' | sed 's/,.*//')
          echo "CUDA version: $CUDA_VER"
          echo "CUDA_MAJOR=$(echo $CUDA_VER | cut -d. -f1)" >> $GITHUB_ENV
      - run: python -m pip install -U pip pytest hypothesis ninja scikit-build-core pybind11 numpy
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DENABLE_CUDA=ON -DENABLE_MPI=ON -DBUILD_PYTHON=OFF
      - run: cmake --build build --parallel
      - run: python tools/backend_checks.py --backend mpi --build-dir build --required --require-cuda-aware-mpi

  cuda:
    needs: gpu-smoke
    if: |
      always() &&
      (needs.gpu-smoke.result == 'success' || needs.gpu-smoke.result == 'skipped')
    runs-on: [self-hosted, linux, x64, gpu]
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      NERVE_TEST_CUDA: "1"
      NERVE_SHARD_INDEX: ${{ matrix.shard }}
      NERVE_SHARD_COUNT: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: nvidia-smi
      - name: Check CUDA version
        run: |
          CUDA_VER=$(nvcc --version | grep "release" | sed 's/.*release //' | sed 's/,.*//')
          echo "CUDA version: $CUDA_VER"
          CUDA_MAJOR=$(echo $CUDA_VER | cut -d. -f1)
          CUDA_MINOR=$(echo $CUDA_VER | cut -d. -f2)
          echo "CUDA_TAG=cu${CUDA_MAJOR}${CUDA_MINOR}" >> $GITHUB_ENV
      - run: python -m pip install -U pip pytest hypothesis ninja scikit-build-core pybind11 numpy
      - name: Install PyTorch matching system CUDA
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/${{ env.CUDA_TAG }}
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DENABLE_CUDA=ON -DENABLE_PYTORCH=ON -DBUILD_PYTHON=ON
      - run: cmake --build build --parallel
      - run: python tools/run_tests.py --build-dir build --label cuda --label generated --retries 2
      - run: python tools/static_analysis.py --language cuda --required
      - run: python tools/backend_checks.py --backend cuda --build-dir build --required

  gpu-benchmark:
    # GPU performance regression suite.
    # Runs on schedule (weekly) and release tags only.
    # Covers: benchmark-labeled C++ tests, GPU performance pytest markers,
    # flaky test tracking, benchmark regression detection, and CUDA sanitizer checks.
    if: |
      always() &&
      (needs.gpu-smoke.result == 'success' || needs.gpu-smoke.result == 'skipped') &&
      (github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v'))
    needs: gpu-smoke
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 120
    env:
      NERVE_TEST_CUDA: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: nvidia-smi
      - name: Check CUDA version
        run: |
          CUDA_VER=$(nvcc --version | grep "release" | sed 's/.*release //' | sed 's/,.*//')
          echo "CUDA version: $CUDA_VER"
          CUDA_MAJOR=$(echo $CUDA_VER | cut -d. -f1)
          CUDA_MINOR=$(echo $CUDA_VER | cut -d. -f2)
          echo "CUDA_TAG=cu${CUDA_MAJOR}${CUDA_MINOR}" >> $GITHUB_ENV
      - run: python -m pip install -U pip pytest hypothesis ninja scikit-build-core pybind11 numpy
      - name: Install PyTorch matching system CUDA
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/${{ env.CUDA_TAG }}
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DENABLE_CUDA=ON -DENABLE_PYTORCH=ON -DBUILD_PYTHON=ON
      - run: cmake --build build --parallel
      # Phase 1: Full correctness suite with flaky test tracking
      - name: Run GPU tests with flaky tracking
        run: |
          python tools/run_tests.py --build-dir build --label cuda --label benchmark --retries 2
          python -m pytest tests/python/ -q -m "cuda or gpu_benchmark or gpu_slow" \
            --flaky-report build/flaky-report-gpu.json \
            --nerve-shard-index 0 --nerve-shard-count 4 \
            --timeout 600 \
            -p no:warnings \
            || echo "GPU pytest completed (check flaky report for details)"
      # Phase 2: Flaky test analysis (soft-fail — non-blocking)
      - name: Analyze flaky tests
        run: python tools/flaky_report.py --ci-mode build/flaky-report-gpu.json
        continue-on-error: true
      # Phase 3: Benchmark regression detection
      - name: Record benchmark baseline (first run)
        if: github.event_name == 'schedule'
        run: |
          if [ ! -s benchmarks/baseline.json ] || [ "$(cat benchmarks/baseline.json)" = '{"version":1,"threshold_pct":5.0,"git_sha":"","tests":{}}' ]; then
            python tools/benchmark_regression.py --record --build-dir build
          fi
      - name: Check benchmark regressions
        run: python tools/benchmark_regression.py --check --build-dir build
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmarks/benchmark-results.json
            build/flaky-report-gpu.json
      - run: python tools/backend_checks.py --backend cuda --build-dir build --required

  windows:
    # Experimental: Windows MSVC build with scalar SIMD mode.
    # continue-on-error prevents failures from blocking other CI jobs
    # while we iterate on platform compatibility.
    continue-on-error: true
    runs-on: windows-2022
    env:
      NINJA_STATUS: "[%f/%t %s] "
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: hendrikmuhs/ccache-action@v1.2
      - name: Install Python dependencies
        run: |
          python -m pip install -U pip pytest hypothesis ninja numpy scipy
      - name: Configure (scalar SIMD, no CUDA, no MPI)
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTS=ON `
            -DBUILD_PYTHON=OFF `
            -DENABLE_CUDA=OFF `
            -DENABLE_MPI=OFF `
            -DNERVE_SIMD=scalar
        shell: pwsh
      - name: Build SIMD primitive regression test
        run: |
          cmake --build build --target nerve_cpp_simd_primitive_regressions --parallel 2>&1
        shell: pwsh
      - name: Run SIMD primitive regression test
        run: |
          ./build/tests/nerve_cpp_simd_primitive_regressions.exe 2>&1
        shell: pwsh
      - name: Build all targets
        run: |
          cmake --build build --parallel 2>&1
        shell: pwsh
      - name: Run CPU/generated tests via ctest
        run: |
          ctest --test-dir build -C Release -L "cpu|generated" --output-on-failure --parallel 2
        shell: pwsh

  changed-module-selection:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip pytest hypothesis numpy scipy
      - run: python tools/run_tests.py --python --changed-from origin/main --shard-index 0 --shard-count 8
