name: docker-ci-image

# Build and push the pynerve CUDA CI Docker image to GitHub Container Registry.
# Triggered manually or when the Dockerfile changes.

on:
  workflow_dispatch:
  push:
    branches: [main, development]
    paths:
      - ".github/docker/Dockerfile.ci"
      - ".github/workflows/docker-ci-image.yml"
  schedule:
    - cron: "0 2 * * 0"  # Weekly rebuild every Sunday at 2am UTC

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cuda: ["12.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/pynerve-ci
          tags: |
            type=raw,value=cuda${{ matrix.cuda }}
            type=raw,value=cuda${{ matrix.cuda }}-{{date 'YYYYMMDD'}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
