<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker>
  </defs>
  <!-- Entry point -->
  <rect x="280" y="15" width="260" height="40" rx="8" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="2"/>
  <text x="410" y="40" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">nerve.compute_persistence(points)</text>
  <line x1="410" y1="55" x2="410" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision: CUDA tensor? -->
  <polygon points="410,80 470,115 410,150 350,115" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="410" y="113" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">CUDA</text>
  <text x="410" y="126" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">tensor?</text>
  <line x1="350" y1="115" x2="280" y2="115" stroke="#4a9a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="315" y="108" text-anchor="middle" fill="#4a9a4a" font-weight="bold" font-size="12">yes</text>
  <rect x="100" y="98" width="180" height="34" rx="8" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="2"/>
  <text x="190" y="119" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">CUDA_HYBRID backend</text>

  <!-- CPU branch (no) -->
  <line x1="470" y1="115" x2="530" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="108" text-anchor="middle" fill="#555" font-weight="bold" font-size="12">no</text>
  <rect x="530" y="98" width="200" height="34" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="630" y="119" text-anchor="middle" fill="#2b5a9a" font-size="12">CPU tensor / ndarray</text>
  <line x1="630" y1="132" x2="630" y2="165" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision: CPUID -> AVX-512? -->
  <polygon points="630,165 690,200 630,235 570,200" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="630" y="193" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">CPUID -></text>
  <text x="630" y="208" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">AVX-512?</text>
  <line x1="570" y1="200" x2="490" y2="200" stroke="#4a9a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="193" text-anchor="middle" fill="#4a9a4a" font-weight="bold" font-size="12">yes</text>
  <rect x="300" y="183" width="190" height="34" rx="8" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="2"/>
  <text x="395" y="204" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">512-bit distance + reduction</text>

  <!-- Decision: CPUID -> AVX2? -->
  <line x1="690" y1="200" x2="730" y2="200" stroke="#555" stroke-width="2"/>
  <line x1="730" y1="200" x2="730" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="730,250 790,285 730,320 670,285" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="730" y="278" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">CPUID -></text>
  <text x="730" y="293" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">AVX2?</text>
  <line x1="670" y1="285" x2="580" y2="285" stroke="#4a9a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="625" y="278" text-anchor="middle" fill="#4a9a4a" font-weight="bold" font-size="12">yes</text>
  <rect x="390" y="268" width="190" height="34" rx="8" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="2"/>
  <text x="485" y="289" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">256-bit distance + reduction</text>

  <!-- SSE4.1 -->
  <line x1="790" y1="285" x2="820" y2="285" stroke="#555" stroke-width="2"/>
  <line x1="820" y1="285" x2="820" y2="335" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="820,335 880,370 820,405 760,370" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="820" y="363" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">CPUID -></text>
  <text x="820" y="378" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">SSE4.1?</text>
  <line x1="760" y1="370" x2="680" y2="370" stroke="#4a9a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="720" y="363" text-anchor="middle" fill="#4a9a4a" font-weight="bold" font-size="12">yes</text>
  <rect x="490" y="353" width="190" height="34" rx="8" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="2"/>
  <text x="585" y="374" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">128-bit distance + reduction</text>

  <!-- Now from the SSE4.1 result, additional decisions based on n -->
  <line x1="585" y1="387" x2="585" y2="420" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision: n < 1000? -->
  <polygon points="585,420 645,455 585,490 525,455" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="585" y="448" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">n &lt; 1000?</text>
  <line x1="525" y1="455" x2="440" y2="455" stroke="#4a9a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="483" y="448" text-anchor="middle" fill="#4a9a4a" font-weight="bold" font-size="12">yes</text>
  <rect x="240" y="438" width="200" height="34" rx="8" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="2"/>
  <text x="340" y="459" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">Single-threaded, stack</text>

  <line x1="645" y1="455" x2="690" y2="455" stroke="#555" stroke-width="2"/>
  <text x="668" y="448" text-anchor="middle" fill="#555" font-size="12">no</text>

  <!-- Decision: n < 10000? -->
  <polygon points="690,455 750,490 690,525 630,490" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="690" y="483" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">n &lt; 10000?</text>
  <line x1="630" y1="490" x2="540" y2="490" stroke="#4a9a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="585" y="483" text-anchor="middle" fill="#4a9a4a" font-weight="bold" font-size="12">yes</text>
  <rect x="350" y="473" width="190" height="34" rx="8" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="2"/>
  <text x="445" y="494" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">Thread pool, work-stealing</text>

  <!-- n > 10000 -->
  <line x1="750" y1="490" x2="790" y2="490" stroke="#555" stroke-width="2"/>
  <text x="770" y="483" text-anchor="middle" fill="#555" font-size="12">no</text>
  <rect x="790" y="473" width="190" height="34" rx="8" fill="#d97a2b" stroke="#a65e1f" stroke-width="2"/>
  <text x="885" y="494" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">n &gt; 10000</text>

  <line x1="885" y1="507" x2="885" y2="550" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Two sub-choices for n > 10000 -->
  <rect x="740" y="550" width="190" height="34" rx="8" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="2"/>
  <text x="835" y="571" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">GPU dispatch (if avail.)</text>
  <rect x="740" y="592" width="190" height="34" rx="8" fill="#d97a2b" stroke="#a65e1f" stroke-width="2"/>
  <text x="835" y="613" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">Distributed (if MPI)</text>
</svg>