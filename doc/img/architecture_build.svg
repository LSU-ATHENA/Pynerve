<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b5a9a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="650" fill="#fafbfc" rx="4"/>

  <text x="400" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#333">Build System Architecture</text>

  <!-- Root CMakeLists.txt -->
  <rect x="280" y="50" width="240" height="36" rx="8" fill="#2b5a9a"/>
  <text x="400" y="73" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">CMakeLists.txt (root)</text>

  <!-- Lines to children -->
  <line x1="380" y1="86" x2="380" y2="110" stroke="#2b5a9a" stroke-width="1.5"/>
  <line x1="420" y1="86" x2="420" y2="110" stroke="#2b5a9a" stroke-width="1.5"/>

  <!-- cmake/ -->
  <rect x="70" y="110" width="180" height="36" rx="8" fill="#d97a2b"/>
  <text x="160" y="133" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">cmake/ (config templates)</text>

  <line x1="160" y1="146" x2="160" y2="165" stroke="#d97a2b" stroke-width="1.5"/>
  <rect x="70" y="168" width="180" height="30" rx="6" fill="#f5e6d8"/>
  <text x="160" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#d97a2b">NerveConfig.cmake.in</text>

  <line x1="160" y1="198" x2="160" y2="210" stroke="#d97a2b" stroke-width="1"/>
  <rect x="70" y="213" width="180" height="30" rx="6" fill="#f5e6d8"/>
  <text x="160" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#d97a2b">code_coverage.cmake</text>

  <!-- src/ -->
  <rect x="310" y="110" width="180" height="36" rx="8" fill="#2b5a9a"/>
  <text x="400" y="133" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">src/</text>

  <line x1="400" y1="146" x2="400" y2="165" stroke="#2b5a9a" stroke-width="1.5"/>
  <rect x="310" y="168" width="180" height="30" rx="6" fill="#e8eef5"/>
  <text x="400" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#2b5a9a">CMakeLists.txt (library targets)</text>

  <line x1="400" y1="198" x2="400" y2="220" stroke="#2b5a9a" stroke-width="1.5"/>
  <rect x="310" y="223" width="180" height="28" rx="6" fill="#e8eef5"/>
  <text x="400" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">cmake/simd.cmake</text>

  <line x1="400" y1="251" x2="400" y2="263" stroke="#2b5a9a" stroke-width="1"/>
  <rect x="310" y="266" width="180" height="28" rx="6" fill="#e8eef5"/>
  <text x="400" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">cmake/source_groups.cmake</text>

  <line x1="400" y1="294" x2="400" y2="306" stroke="#2b5a9a" stroke-width="1"/>
  <rect x="310" y="309" width="180" height="28" rx="6" fill="#e8eef5"/>
  <text x="400" y="327" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">cmake/targets.cmake</text>

  <line x1="400" y1="337" x2="400" y2="355" stroke="#2b5a9a" stroke-width="1.5"/>
  <rect x="310" y="358" width="180" height="28" rx="6" fill="#e8eef5"/>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#888">(source dirs, each with CMakeLists.txt)</text>

  <!-- python/ -->
  <rect x="550" y="110" width="180" height="36" rx="8" fill="#4a9a4a"/>
  <text x="640" y="133" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">python/ (Python bindings)</text>

  <line x1="640" y1="146" x2="640" y2="165" stroke="#4a9a4a" stroke-width="1.5"/>
  <rect x="550" y="168" width="180" height="30" rx="6" fill="#e8f5e8"/>
  <text x="640" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4a9a4a">CMakeLists.txt (pybind11 ext)</text>

  <!-- tests/ -->
  <rect x="310" y="420" width="180" height="36" rx="8" fill="#2b5a9a"/>
  <text x="400" y="443" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">tests/</text>

  <line x1="360" y1="456" x2="360" y2="475" stroke="#2b5a9a" stroke-width="1.5"/>
  <rect x="280" y="478" width="160" height="30" rx="6" fill="#e8eef5"/>
  <text x="360" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#2b5a9a">cpp/ (C++ tests)</text>

  <line x1="440" y1="456" x2="440" y2="475" stroke="#2b5a9a" stroke-width="1.5"/>
  <rect x="460" y="478" width="160" height="30" rx="6" fill="#e8eef5"/>
  <text x="540" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#2b5a9a">python/ (Python tests)</text>

  <!-- examples/ -->
  <rect x="550" y="420" width="180" height="36" rx="8" fill="#2b5a9a"/>
  <text x="640" y="443" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">examples/</text>

  <line x1="640" y1="456" x2="640" y2="478" stroke="#2b5a9a" stroke-width="1.5"/>
  <rect x="550" y="478" width="180" height="30" rx="6" fill="#e8eef5"/>
  <text x="640" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#2b5a9a">CMakeLists.txt (example targets)</text>

  <!-- Vertical line connecting root to branches -->
  <line x1="400" y1="50" x2="400" y2="110" stroke="#2b5a9a" stroke-width="1" stroke-dasharray="5,3"/>
</svg>