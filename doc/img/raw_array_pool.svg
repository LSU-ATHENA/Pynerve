<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 280" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2b5a9a"/></marker>
  </defs>
  <!-- Preallocated block -->
  <text x="30" y="30" fill="#333" font-weight="bold" font-size="14">Preallocated block:</text>

  <!-- Large memory bar -->
  <rect x="30" y="45" width="700" height="50" rx="4" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2"/>
  <text x="380" y="75" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">preallocated bytes: initial_bytes</text>

  <!-- Cursor and end markers -->
  <line x1="30" y1="108" x2="30" y2="130" stroke="#d97a2b" stroke-width="2.5"/>
  <polygon points="30,130 25,138 35,138" fill="#d97a2b"/>
  <text x="30" y="150" text-anchor="middle" fill="#d97a2b" font-weight="bold" font-size="13">cursor</text>

  <line x1="730" y1="108" x2="730" y2="130" stroke="#2b5a9a" stroke-width="2.5"/>
  <polygon points="730,130 725,138 735,138" fill="#2b5a9a"/>
  <text x="730" y="150" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="13">end</text>

  <!-- After allocation section -->
  <text x="30" y="185" fill="#333" font-weight="bold" font-size="14">After allocation of N bytes:</text>

  <!-- Used portion -->
  <rect x="30" y="195" width="280" height="50" rx="4" fill="#d4edda" stroke="#4a9a4a" stroke-width="2"/>
  <text x="170" y="225" text-anchor="middle" fill="#2d6e2d" font-weight="bold" font-size="14">used: N bytes</text>

  <!-- Free portion -->
  <rect x="310" y="195" width="420" height="50" rx="4" fill="#fff3cd" stroke="#d97a2b" stroke-width="2"/>
  <text x="520" y="225" text-anchor="middle" fill="#a65e1f" font-weight="bold" font-size="14">free: initial_bytes − N bytes</text>

  <!-- Cursor after allocation -->
  <line x1="310" y1="258" x2="310" y2="280" stroke="#d97a2b" stroke-width="2.5"/>
  <polygon points="310,280 305,288 315,288" fill="#d97a2b"/>
  <text x="310" y="298" text-anchor="middle" fill="#d97a2b" font-weight="bold" font-size="13">cursor</text>

  <line x1="730" y1="258" x2="730" y2="280" stroke="#2b5a9a" stroke-width="2.5"/>
  <polygon points="730,280 725,288 735,288" fill="#2b5a9a"/>
  <text x="730" y="298" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="13">end</text>

  <!-- Separator line between used and free -->
  <line x1="310" y1="195" x2="310" y2="245" stroke="#d97a2b" stroke-width="2" stroke-dasharray="4,3"/>
</svg>