<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2b5a9a"/></marker>
  </defs>
  <!-- Socket 0 -->
  <rect x="20" y="20" width="300" height="260" rx="10" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2.5"/>
  <text x="170" y="48" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="16">Socket 0</text>

  <!-- Memory controller on Socket 0 -->
  <rect x="40" y="65" width="260" height="40" rx="6" fill="#d4edda" stroke="#4a9a4a" stroke-width="1.5"/>
  <text x="170" y="85" text-anchor="middle" fill="#2d6e2d" font-weight="bold">Memory Controller</text>
  <text x="170" y="99" text-anchor="middle" fill="#555" font-size="11">DDR4 / DDR5</text>

  <!-- Cores on Socket 0 -->
  <rect x="40" y="125" width="260" height="130" rx="6" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="170" y="145" text-anchor="middle" fill="#a65e1f" font-weight="bold">Cores 0-31</text>
  <!-- Core mini-boxes -->
  <rect x="50" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="64" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C0</text>
  <rect x="82" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="96" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C1</text>
  <rect x="114" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="128" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C2</text>
  <rect x="146" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="160" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C3</text>
  <rect x="178" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="192" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C4</text>
  <rect x="210" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="224" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C5</text>
  <rect x="242" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="256" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C6</text>
  <text x="170" y="200" text-anchor="middle" fill="#a65e1f" font-size="10">...</text>
  <text x="170" y="215" text-anchor="middle" fill="#a65e1f" font-size="10">C24 ... C31</text>

  <!-- Socket 1 -->
  <rect x="400" y="20" width="300" height="260" rx="10" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2.5"/>
  <text x="550" y="48" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="16">Socket 1</text>

  <!-- Memory controller on Socket 1 -->
  <rect x="420" y="65" width="260" height="40" rx="6" fill="#d4edda" stroke="#4a9a4a" stroke-width="1.5"/>
  <text x="550" y="85" text-anchor="middle" fill="#2d6e2d" font-weight="bold">Memory Controller</text>
  <text x="550" y="99" text-anchor="middle" fill="#555" font-size="11">DDR4 / DDR5</text>

  <!-- Cores on Socket 1 -->
  <rect x="420" y="125" width="260" height="130" rx="6" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="550" y="145" text-anchor="middle" fill="#a65e1f" font-weight="bold">Cores 32-63</text>
  <rect x="430" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="444" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C32</text>
  <rect x="462" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="476" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C33</text>
  <rect x="494" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="508" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C34</text>
  <rect x="526" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="540" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C35</text>
  <rect x="558" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="572" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C36</text>
  <rect x="590" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="604" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C37</text>
  <rect x="622" y="155" width="28" height="22" rx="3" fill="#fde8c8" stroke="#d97a2b" stroke-width="1"/>
  <text x="636" y="170" text-anchor="middle" fill="#a65e1f" font-size="9">C38</text>
  <text x="550" y="200" text-anchor="middle" fill="#a65e1f" font-size="10">...</text>
  <text x="550" y="215" text-anchor="middle" fill="#a65e1f" font-size="10">C56 ... C63</text>

  <!-- Interconnect between sockets -->
  <rect x="310" y="120" width="100" height="50" rx="10" fill="#f0f0f0" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="360" y="145" text-anchor="middle" fill="#555" font-weight="bold" font-size="11">Inter-</text>
  <text x="360" y="159" text-anchor="middle" fill="#555" font-weight="bold" font-size="11">connect</text>
  <line x1="320" y1="120" x2="320" y2="105" stroke="#2b5a9a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="120" x2="400" y2="105" stroke="#2b5a9a" stroke-width="2" marker-end="url(#arrow)"/>
</svg>