<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2b5a9a"/></marker>
  </defs>
  <!-- Root: Global / Thread-local allocation tracking -->
  <rect x="220" y="15" width="360" height="40" rx="8" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Global / Thread-local allocation tracking</text>
  <line x1="400" y1="55" x2="400" y2="80" stroke="#2b5a9a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vertical stem -->
  <line x1="400" y1="80" x2="400" y2="90" stroke="#2b5a9a" stroke-width="2"/>

  <!-- Horizontal brace -->
  <line x1="100" y1="90" x2="700" y2="90" stroke="#2b5a9a" stroke-width="2"/>
  <line x1="100" y1="90" x2="100" y2="110" stroke="#2b5a9a" stroke-width="2"/>
  <line x1="320" y1="90" x2="320" y2="110" stroke="#2b5a9a" stroke-width="2"/>
  <line x1="480" y1="90" x2="480" y2="110" stroke="#2b5a9a" stroke-width="2"/>
  <line x1="700" y1="90" x2="700" y2="110" stroke="#2b5a9a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 1: GlobalPagePool -->
  <rect x="20" y="115" width="160" height="44" rx="8" fill="#d4edda" stroke="#4a9a4a" stroke-width="2"/>
  <text x="100" y="136" text-anchor="middle" fill="#2d6e2d" font-weight="bold" font-size="13">GlobalPagePool</text>
  <text x="100" y="150" text-anchor="middle" fill="#555" font-size="10">hugepage recycling</text>

  <line x1="100" y1="159" x2="100" y2="185" stroke="#4a9a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="100" y1="185" x2="250" y2="185" stroke="#4a9a4a" stroke-width="1.5"/>
  <line x1="250" y1="185" x2="250" y2="205" stroke="#4a9a4a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="170" y="210" width="160" height="44" rx="8" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="250" y="231" text-anchor="middle" fill="#a65e1f" font-weight="bold" font-size="12">RawArrayPool</text>
  <text x="250" y="245" text-anchor="middle" fill="#555" font-size="10">bump allocator</text>

  <line x1="100" y1="185" x2="250" y2="270" stroke="#4a9a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="170" y="270" width="160" height="44" rx="8" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="250" y="291" text-anchor="middle" fill="#a65e1f" font-weight="bold" font-size="12">SizeClassAllocator</text>
  <text x="250" y="305" text-anchor="middle" fill="#555" font-size="10">16 size classes</text>

  <!-- SlabAllocator -->
  <rect x="240" y="115" width="160" height="44" rx="8" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2"/>
  <text x="320" y="136" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="13">SlabAllocator&lt;T&gt;</text>
  <text x="320" y="150" text-anchor="middle" fill="#555" font-size="10">per-type, lock-free CAS free-list</text>

  <line x1="320" y1="159" x2="320" y2="190" stroke="#2b5a9a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="195" width="160" height="44" rx="8" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="320" y="216" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="12">ThreadLocalPool&lt;T&gt;</text>
  <text x="320" y="230" text-anchor="middle" fill="#555" font-size="10">per-thread singleton</text>

  <line x1="320" y1="239" x2="320" y2="270" stroke="#2b5a9a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="270" width="160" height="44" rx="8" fill="#d4edda" stroke="#4a9a4a" stroke-width="1.5"/>
  <text x="320" y="291" text-anchor="middle" fill="#2d6e2d" font-weight="bold" font-size="12">PooledPtr&lt;T&gt;</text>
  <text x="320" y="305" text-anchor="middle" fill="#555" font-size="10">RAII with ThreadLocalPool</text>

  <!-- NumaAwareAllocator -->
  <rect x="460" y="115" width="160" height="44" rx="8" fill="#fde8c8" stroke="#d97a2b" stroke-width="2"/>
  <text x="540" y="136" text-anchor="middle" fill="#a65e1f" font-weight="bold" font-size="13">NumaAwareAllocator</text>
  <text x="540" y="150" text-anchor="middle" fill="#555" font-size="10">libnuma</text>

  <line x1="540" y1="159" x2="540" y2="190" stroke="#d97a2b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="190" x2="470" y2="210" stroke="#d97a2b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="190" x2="610" y2="210" stroke="#d97a2b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="390" y="210" width="160" height="44" rx="8" fill="#fde8c8" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="470" y="231" text-anchor="middle" fill="#a65e1f" font-weight="bold" font-size="12">NumaAwareMemoryPool</text>
  <text x="470" y="245" text-anchor="middle" fill="#555" font-size="10">per-NUMA-node pools</text>

  <rect x="560" y="210" width="160" height="44" rx="8" fill="#fde8c8" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="640" y="231" text-anchor="middle" fill="#a65e1f" font-weight="bold" font-size="12">NumaPoolManager</text>
  <text x="640" y="245" text-anchor="middle" fill="#555" font-size="10">singleton global state</text>

  <!-- PoolBackedVector -->
  <rect x="580" y="115" width="200" height="44" rx="8" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2"/>
  <text x="680" y="136" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="13">PoolBackedVector&lt;T&gt;</text>
  <text x="680" y="150" text-anchor="middle" fill="#555" font-size="10">vector backed by RawArrayPool</text>
</svg>