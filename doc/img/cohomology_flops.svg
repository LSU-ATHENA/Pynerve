<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380">
  <defs>
    <style>
      text { font-family: sans-serif; }
      .title { font-size: 15px; fill: #111; font-weight: bold; }
      .axis-label { font-size: 11px; fill: #666; }
      .bar-label { font-size: 10px; fill: #333; font-weight: bold; }
      .value-label { font-size: 11px; fill: #fff; font-weight: bold; }
    </style>
  </defs>

  <text x="20" y="25" class="title">FLOPS Analysis  --  Per-Column Complexity</text>

  <!-- Y-axis -->
  <line x1="80" y1="50" x2="80" y2="320" stroke="#ccc" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="620" y2="320" stroke="#ccc" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="75" y="324" class="axis-label" text-anchor="end">0</text>
  <line x1="80" y1="280" x2="85" y2="280" stroke="#ccc" stroke-width="1"/>
  <text x="75" y="284" class="axis-label" text-anchor="end">O(k)</text>
  <line x1="80" y1="240" x2="85" y2="240" stroke="#ccc" stroke-width="1"/>
  <text x="75" y="244" class="axis-label" text-anchor="end">O(k+k')</text>
  <line x1="80" y1="200" x2="85" y2="200" stroke="#ccc" stroke-width="1"/>
  <text x="75" y="204" class="axis-label" text-anchor="end">O(w)</text>
  <line x1="80" y1="160" x2="85" y2="160" stroke="#ccc" stroke-width="1"/>
  <text x="75" y="164" class="axis-label" text-anchor="end">O(1)</text>

  <text x="20" y="70" class="axis-label">Complexity</text>

  <!-- Bar 1: Column XOR (sparse) -->
  <rect x="100" y="240" width="100" height="80" rx="4" fill="#2b5a9a"/>
  <text x="150" y="310" class="value-label" text-anchor="middle">O(k + k')</text>

  <!-- Bar 2: Column XOR (bitset) -->
  <rect x="220" y="200" width="100" height="120" rx="4" fill="#4a9a4a"/>
  <text x="270" y="310" class="value-label" text-anchor="middle">O(w)</text>

  <!-- Bar 3: Pivot find (sparse) -->
  <rect x="340" y="160" width="100" height="160" rx="4" fill="#d97a2b"/>
  <text x="390" y="310" class="value-label" text-anchor="middle">O(1)</text>

  <!-- Bar 4: Pivot find (bitset) -->
  <rect x="460" y="200" width="100" height="120" rx="4" fill="#2b5a9a" opacity="0.7"/>
  <text x="510" y="310" class="value-label" text-anchor="middle">O(w)</text>

  <!-- X-axis labels -->
  <text x="150" y="340" class="bar-label" text-anchor="middle">Column XOR</text>
  <text x="150" y="355" class="axis-label" text-anchor="middle">(sparse)</text>
  <text x="270" y="340" class="bar-label" text-anchor="middle">Column XOR</text>
  <text x="270" y="355" class="axis-label" text-anchor="middle">(bitset)</text>
  <text x="390" y="340" class="bar-label" text-anchor="middle">Pivot find</text>
  <text x="390" y="355" class="axis-label" text-anchor="middle">(sparse)</text>
  <text x="510" y="340" class="bar-label" text-anchor="middle">Pivot find</text>
  <text x="510" y="355" class="axis-label" text-anchor="middle">(bitset)</text>

  <!-- Notes -->
  <text x="20" y="370" class="axis-label" fill="#888">
    k,k' = non-zero count | w = words in bitset | Clearing: O(1)  --  flag only
  </text>
</svg>