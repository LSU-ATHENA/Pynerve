<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .title { font-size: 15px; fill: #111; font-weight: bold; }
      .heading { font-size: 13px; fill: #333; font-weight: bold; }
      .pattern-label { font-size: 11px; fill: #fff; font-weight: bold; }
      .pattern-desc { font-size: 10px; fill: #ddd; }
      .section-label { font-size: 12px; fill: #555; font-weight: bold; }
    </style>
  </defs>

  <text x="20" y="25" class="title">TDA Pipeline Design Patterns</text>

  <!-- Core Pipeline Flow -->
  <text x="20" y="55" class="section-label">Core Pipeline:</text>

  <rect x="20" y="70" width="120" height="50" rx="8" fill="#2b5a9a"/>
  <text x="80" y="97" class="pattern-label" text-anchor="middle">Point Cloud</text>

  <line x1="140" y1="95" x2="170" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="175" y="70" width="120" height="50" rx="8" fill="#4a9a4a"/>
  <text x="235" y="97" class="pattern-label" text-anchor="middle">Filtration</text>

  <line x1="295" y1="95" x2="325" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="330" y="70" width="120" height="50" rx="8" fill="#d97a2b"/>
  <text x="390" y="97" class="pattern-label" text-anchor="middle">Reduction</text>

  <line x1="450" y1="95" x2="480" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="485" y="70" width="120" height="50" rx="8" fill="#2b5a9a"/>
  <text x="545" y="97" class="pattern-label" text-anchor="middle">Vectorization</text>

  <line x1="605" y1="95" x2="635" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="640" y="70" width="60" height="50" rx="8" fill="#333"/>
  <text x="670" y="97" class="pattern-label" text-anchor="middle" font-size="10">ML</text>

  <!-- Pattern 1 -->
  <text x="20" y="155" class="section-label">Pattern 1: Classic TDA -> ML</text>
  <rect x="20" y="165" width="100" height="30" rx="5" fill="#2b5a9a" opacity="0.15" stroke="#2b5a9a" stroke-width="1"/>
  <text x="70" y="185" class="pattern-label" fill="#2b5a9a" text-anchor="middle" font-size="10">Point cloud</text>
  <line x1="120" y1="180" x2="140" y2="180" stroke="#2b5a9a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="145" y="165" width="100" height="30" rx="5" fill="#4a9a4a" opacity="0.15" stroke="#4a9a4a" stroke-width="1"/>
  <text x="195" y="185" class="pattern-label" fill="#4a9a4a" text-anchor="middle" font-size="10">Persistence</text>
  <line x1="245" y1="180" x2="265" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="270" y="165" width="100" height="30" rx="5" fill="#d97a2b" opacity="0.15" stroke="#d97a2b" stroke-width="1"/>
  <text x="320" y="185" class="pattern-label" fill="#d97a2b" text-anchor="middle" font-size="10">Vectorization</text>
  <line x1="370" y1="180" x2="390" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="395" y="165" width="100" height="30" rx="5" fill="#333" opacity="0.15" stroke="#333" stroke-width="1"/>
  <text x="445" y="185" class="pattern-label" fill="#333" text-anchor="middle" font-size="10">ML model</text>

  <!-- Pattern 2 -->
  <text x="20" y="225" class="section-label">Pattern 2: Time Series -> RNN/Transformer</text>
  <rect x="20" y="235" width="100" height="30" rx="5" fill="#2b5a9a" opacity="0.15" stroke="#2b5a9a" stroke-width="1"/>
  <text x="70" y="255" class="pattern-label" fill="#2b5a9a" text-anchor="middle" font-size="10">Time series</text>
  <line x1="120" y1="250" x2="140" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="145" y="235" width="100" height="30" rx="5" fill="#4a9a4a" opacity="0.15" stroke="#4a9a4a" stroke-width="1"/>
  <text x="195" y="255" class="pattern-label" fill="#4a9a4a" text-anchor="middle" font-size="10">Windowed PH</text>
  <line x1="245" y1="250" x2="265" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="270" y="235" width="100" height="30" rx="5" fill="#333" opacity="0.15" stroke="#333" stroke-width="1"/>
  <text x="320" y="255" class="pattern-label" fill="#333" text-anchor="middle" font-size="10">LSTM / Transformer</text>

  <!-- Pattern 3 -->
  <text x="20" y="295" class="section-label">Pattern 3: Large Dataset -> Clustering</text>
  <rect x="20" y="305" width="100" height="30" rx="5" fill="#2b5a9a" opacity="0.15" stroke="#2b5a9a" stroke-width="1"/>
  <text x="70" y="325" class="pattern-label" fill="#2b5a9a" text-anchor="middle" font-size="10">Large dataset</text>
  <line x1="120" y1="320" x2="140" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="145" y="305" width="100" height="30" rx="5" fill="#4a9a4a" opacity="0.15" stroke="#4a9a4a" stroke-width="1"/>
  <text x="195" y="325" class="pattern-label" fill="#4a9a4a" text-anchor="middle" font-size="10">Sparse VR</text>
  <line x1="245" y1="320" x2="265" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="270" y="305" width="100" height="30" rx="5" fill="#d97a2b" opacity="0.15" stroke="#d97a2b" stroke-width="1"/>
  <text x="320" y="325" class="pattern-label" fill="#d97a2b" text-anchor="middle" font-size="10">Bottleneck dist</text>
  <line x1="370" y1="320" x2="390" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="395" y="305" width="100" height="30" rx="5" fill="#333" opacity="0.15" stroke="#333" stroke-width="1"/>
  <text x="445" y="325" class="pattern-label" fill="#333" text-anchor="middle" font-size="10">Clustering</text>
</svg>