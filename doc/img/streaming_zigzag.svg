<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 280" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker>
    <marker id="arrow-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2b5a9a"/></marker>
  </defs>
  <!-- Window boxes -->
  <rect x="30" y="20" width="200" height="50" rx="8" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2"/>
  <text x="130" y="50" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">Window 0</text>
  <rect x="290" y="20" width="200" height="50" rx="8" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2"/>
  <text x="390" y="50" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">Window 1</text>
  <rect x="550" y="20" width="200" height="50" rx="8" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2"/>
  <text x="650" y="50" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">Window 2</text>

  <!-- Arrows between windows -->
  <line x1="230" y1="45" x2="290" y2="45" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="45" x2="550" y2="45" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- H1 label -->
  <rect x="30" y="100" width="720" height="28" rx="5" fill="#f0f0f0" stroke="#aaa" stroke-width="1"/>
  <text x="45" y="118" fill="#333" font-weight="bold">H₁ features:</text>

  <!-- Feature a: born in W0, dies in W1 -->
  <rect x="60" y="145" width="60" height="30" rx="6" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="1.5"/>
  <text x="90" y="164" text-anchor="middle" fill="#fff" font-weight="bold">a</text>
  <line x1="120" y1="160" x2="200" y2="160" stroke="#4a9a4a" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="160" y="155" text-anchor="middle" fill="#4a9a4a" font-size="11">dies</text>
  <rect x="200" y="145" width="55" height="30" rx="6" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="227" y="164" text-anchor="middle" fill="#555" font-size="11"> -- </text>
  <line x1="255" y1="160" x2="320" y2="160" stroke="#666" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="320" y="145" width="55" height="30" rx="6" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="347" y="164" text-anchor="middle" fill="#555" font-size="11"> -- </text>

  <!-- Feature b: born in W0, persists through W1, dies in W2 -->
  <line x1="60" y1="190" x2="200" y2="190" stroke="#2b5a9a" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="60" y="190" width="60" height="30" rx="6" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="1.5"/>
  <text x="90" y="209" text-anchor="middle" fill="#fff" font-weight="bold">b</text>
  <line x1="120" y1="205" x2="200" y2="205" stroke="#2b5a9a" stroke-width="2"/>
  <rect x="200" y="190" width="60" height="30" rx="6" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="1.5"/>
  <text x="230" y="209" text-anchor="middle" fill="#fff" font-weight="bold">b</text>
  <line x1="260" y1="205" x2="440" y2="205" stroke="#2b5a9a" stroke-width="2"/>
  <rect x="440" y="190" width="55" height="30" rx="6" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="467" y="209" text-anchor="middle" fill="#555" font-size="11"> -- </text>

  <!-- Feature c: born in W1, persists through W2 -->
  <rect x="200" y="190" width="60" height="30" rx="6" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="1.5"/>
  <text x="230" y="209" text-anchor="middle" fill="#fff" font-weight="bold">c</text>
  <line x1="260" y1="205" x2="440" y2="205" stroke="#4a9a4a" stroke-width="2"/>
  <rect x="440" y="190" width="60" height="30" rx="6" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="1.5"/>
  <text x="470" y="209" text-anchor="middle" fill="#fff" font-weight="bold">c</text>
  <line x1="500" y1="205" x2="620" y2="205" stroke="#4a9a4a" stroke-width="2"/>
  <text x="560" y="200" text-anchor="middle" fill="#4a9a4a" font-size="11">persists</text>

  <!-- Feature d: born and dies within W0 -->
  <rect x="60" y="235" width="60" height="30" rx="6" fill="#d97a2b" stroke="#a65e1f" stroke-width="1.5"/>
  <text x="90" y="254" text-anchor="middle" fill="#fff" font-weight="bold">d</text>
  <line x1="120" y1="250" x2="180" y2="250" stroke="#d97a2b" stroke-width="2"/>
  <rect x="180" y="235" width="55" height="30" rx="6" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="207" y="254" text-anchor="middle" fill="#555" font-size="11"> -- </text>
  <text x="140" y="245" text-anchor="middle" fill="#d97a2b" font-size="11">dies</text>

  <!-- Legend -->
  <rect x="550" y="235" width="12" height="12" rx="2" fill="#4a9a4a"/>
  <text x="568" y="246" fill="#333" font-size="11">Birth</text>
  <rect x="620" y="235" width="12" height="12" rx="2" fill="#2b5a9a"/>
  <text x="638" y="246" fill="#333" font-size="11">Persist</text>
  <rect x="690" y="235" width="12" height="12" rx="2" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="708" y="246" fill="#333" font-size="11">Dead</text>
</svg>