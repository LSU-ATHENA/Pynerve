<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 720" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker>
    <marker id="arrow-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9a4a"/></marker>
  </defs>
  <!-- Input point cloud -->
  <rect x="240" y="10" width="300" height="40" rx="8" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="2"/>
  <text x="390" y="35" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Input point cloud</text>
  <line x1="390" y1="50" x2="390" y2="75" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Partition across GPUs -->
  <rect x="240" y="75" width="300" height="36" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="390" y="98" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="13">Partition across GPUs</text>
  <line x1="170" y1="108" x2="170" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="111" x2="390" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="108" x2="610" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GPU 0, 1, 2, 3 boxes -->
  <rect x="70" y="138" width="200" height="40" rx="6" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="1.5"/>
  <text x="170" y="163" text-anchor="middle" fill="#fff" font-weight="bold">GPU 0</text>
  <rect x="290" y="138" width="200" height="40" rx="6" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="1.5"/>
  <text x="390" y="163" text-anchor="middle" fill="#fff" font-weight="bold">GPU 1</text>
  <rect x="510" y="138" width="200" height="40" rx="6" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="1.5"/>
  <text x="610" y="163" text-anchor="middle" fill="#fff" font-weight="bold">GPU 2</text>

  <line x1="170" y1="178" x2="170" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="178" x2="390" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="178" x2="610" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Local distance slab -->
  <rect x="70" y="200" width="200" height="36" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="170" y="216" text-anchor="middle" fill="#2b5a9a" font-size="11">Local distance slab</text>
  <text x="170" y="230" text-anchor="middle" fill="#555" font-size="10">(each GPU)</text>
  <rect x="290" y="200" width="200" height="36" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="390" y="216" text-anchor="middle" fill="#2b5a9a" font-size="11">Local distance slab</text>
  <text x="390" y="230" text-anchor="middle" fill="#555" font-size="10">(each GPU)</text>
  <rect x="510" y="200" width="200" height="36" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="610" y="216" text-anchor="middle" fill="#2b5a9a" font-size="11">Local distance slab</text>
  <text x="610" y="230" text-anchor="middle" fill="#555" font-size="10">(each GPU)</text>

  <!-- NCCL AllGather arrow across GPUs -->
  <line x1="170" y1="236" x2="170" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="236" x2="390" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="236" x2="610" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NCCL AllGather box -->
  <rect x="140" y="270" width="500" height="36" rx="8" fill="#d4edda" stroke="#4a9a4a" stroke-width="2"/>
  <text x="390" y="288" text-anchor="middle" fill="#2d6e2d" font-weight="bold" font-size="13">NCCL AllGather  --  full distance matrix (distributed)</text>
  <text x="390" y="302" text-anchor="middle" fill="#555" font-size="10">GPU 0 ⟷ GPU 1 ⟷ GPU 2</text>

  <line x1="170" y1="306" x2="170" y2="338" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="306" x2="390" y2="338" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="306" x2="610" y2="338" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Local boundary matrix -->
  <rect x="70" y="338" width="200" height="36" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="170" y="354" text-anchor="middle" fill="#2b5a9a" font-size="11">Local boundary matrix</text>
  <text x="170" y="368" text-anchor="middle" fill="#555" font-size="10">columns</text>
  <rect x="290" y="338" width="200" height="36" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="390" y="354" text-anchor="middle" fill="#2b5a9a" font-size="11">Local boundary matrix</text>
  <text x="390" y="368" text-anchor="middle" fill="#555" font-size="10">columns</text>
  <rect x="510" y="338" width="200" height="36" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="610" y="354" text-anchor="middle" fill="#2b5a9a" font-size="11">Local boundary matrix</text>
  <text x="610" y="368" text-anchor="middle" fill="#555" font-size="10">columns</text>

  <line x1="170" y1="374" x2="170" y2="406" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="374" x2="390" y2="406" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="374" x2="610" y2="406" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Local reduction -->
  <rect x="70" y="406" width="200" height="36" rx="6" fill="#d4edda" stroke="#4a9a4a" stroke-width="1.5"/>
  <text x="170" y="422" text-anchor="middle" fill="#2d6e2d" font-size="11" font-weight="bold">Local reduction</text>
  <text x="170" y="436" text-anchor="middle" fill="#555" font-size="10">(warp-shuffle, fixed tree)</text>
  <rect x="290" y="406" width="200" height="36" rx="6" fill="#d4edda" stroke="#4a9a4a" stroke-width="1.5"/>
  <text x="390" y="422" text-anchor="middle" fill="#2d6e2d" font-size="11" font-weight="bold">Local reduction</text>
  <text x="390" y="436" text-anchor="middle" fill="#555" font-size="10">(warp-shuffle, fixed tree)</text>
  <rect x="510" y="406" width="200" height="36" rx="6" fill="#d4edda" stroke="#4a9a4a" stroke-width="1.5"/>
  <text x="610" y="422" text-anchor="middle" fill="#2d6e2d" font-size="11" font-weight="bold">Local reduction</text>
  <text x="610" y="436" text-anchor="middle" fill="#555" font-size="10">(warp-shuffle, fixed tree)</text>

  <!-- Pivot exchange arrows between GPUs -->
  <line x1="170" y1="442" x2="170" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="442" x2="390" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="442" x2="610" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pivot exchange box -->
  <rect x="140" y="475" width="500" height="36" rx="8" fill="#fff3cd" stroke="#d97a2b" stroke-width="2"/>
  <text x="390" y="493" text-anchor="middle" fill="#a65e1f" font-weight="bold" font-size="13">Pivot exchange via NVLink P2P or NCCL</text>
  <text x="390" y="507" text-anchor="middle" fill="#555" font-size="10">GPU 0 ⟷ GPU 1, GPU 1 ⟷ GPU 2</text>

  <line x1="390" y1="511" x2="390" y2="540" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cross-GPU pivot resolution -->
  <rect x="190" y="540" width="400" height="36" rx="8" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="2"/>
  <text x="390" y="563" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="13">Cross-GPU pivot resolution</text>

  <line x1="390" y1="576" x2="390" y2="605" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- NCCL AllReduce -->
  <rect x="140" y="605" width="500" height="36" rx="8" fill="#d4edda" stroke="#4a9a4a" stroke-width="2"/>
  <text x="390" y="623" text-anchor="middle" fill="#2d6e2d" font-weight="bold" font-size="13">NCCL AllReduce / ReduceScatter for pair collection</text>
  <text x="390" y="637" text-anchor="middle" fill="#555" font-size="10">GPU 0 ⟷ GPU 1 ⟷ GPU 2</text>

  <line x1="390" y1="641" x2="390" y2="670" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Diagram assembled on rank 0 -->
  <rect x="190" y="670" width="400" height="36" rx="8" fill="#2b5a9a" stroke="#1a3d6e" stroke-width="2"/>
  <text x="390" y="693" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Diagram assembled on rank 0</text>
</svg>