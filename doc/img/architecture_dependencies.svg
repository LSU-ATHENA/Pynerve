<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 950" width="100%">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b5a9a"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9a4a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="950" fill="#fafbfc" rx="4"/>

  <text x="550" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#333">Module Dependency Graph</text>

  <!-- nerve_python (root) -->
  <rect x="440" y="45" width="220" height="36" rx="8" fill="#2b5a9a"/>
  <text x="550" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">nerve_python (Python package)</text>

  <!-- Lines to level 2 -->
  <line x1="510" y1="81" x2="510" y2="105" stroke="#2b5a9a" stroke-width="1.5"/>
  <line x1="570" y1="81" x2="570" y2="105" stroke="#2b5a9a" stroke-width="1.5"/>
  <line x1="610" y1="81" x2="610" y2="105" stroke="#2b5a9a" stroke-width="1.5"/>

  <!-- Level 2 modules -->
  <rect x="80" y="108" width="280" height="34" rx="8" fill="#2b5a9a"/>
  <text x="220" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">nerve_internal (pybind11 ext)</text>

  <rect x="430" y="108" width="240" height="34" rx="8" fill="#2b5a9a"/>
  <text x="550" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">nerve.torch (Python torch)</text>

  <rect x="740" y="108" width="290" height="34" rx="8" fill="#d97a2b"/>
  <text x="885" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">nerve.cupy_ops / fast_ops / mp_shared</text>

  <!-- nerve_internal submodules -->
  <line x1="220" y1="142" x2="220" y2="165" stroke="#2b5a9a" stroke-width="1.5"/>

  <!-- Persistence block -->
  <rect x="30" y="168" width="200" height="30" rx="6" fill="#2b5a9a"/>
  <text x="130" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="white">nerve::persistence</text>

  <!-- Core block -->
  <rect x="250" y="168" width="200" height="30" rx="6" fill="#2b5a9a"/>
  <text x="350" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="white">nerve::core</text>

  <!-- GPU block -->
  <rect x="470" y="168" width="200" height="30" rx="6" fill="#4a9a4a"/>
  <text x="570" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="white">nerve::gpu</text>

  <!-- Spectral block -->
  <rect x="690" y="168" width="200" height="30" rx="6" fill="#2b5a9a"/>
  <text x="790" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="white">nerve::spectral</text>

  <!-- Streaming block -->
  <rect x="910" y="168" width="180" height="30" rx="6" fill="#2b5a9a"/>
  <text x="1000" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="white">nerve::streaming</text>

  <!-- Other nerve_internal children -->
  <line x1="220" y1="142" x2="220" y2="220" stroke="#2b5a9a" stroke-width="1.5"/>
  <rect x="80" y="223" width="280" height="26" rx="6" fill="#e8eef5"/>
  <text x="220" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#2b5a9a">nerve::torch, nerve::io, nerve::serialization, nerve::errors</text>

  <!-- Lines to sub-modules -->
  <line x1="130" y1="198" x2="130" y2="220" stroke="#2b5a9a" stroke-width="1"/>

  <!-- Persistence submodules -->
  <rect x="15" y="223" width="230" height="24" rx="5" fill="#e8eef5"/>
  <text x="130" y="239" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::algorithms (distance, KNN)</text>

  <rect x="15" y="252" width="230" height="24" rx="5" fill="#e8eef5"/>
  <text x="130" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::algebra (simplices, boundary)</text>

  <rect x="15" y="281" width="230" height="24" rx="5" fill="#e8eef5"/>
  <text x="130" y="297" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::filtration (VR, sparse, level set)</text>

  <rect x="15" y="310" width="230" height="24" rx="5" fill="#e8eef5"/>
  <text x="130" y="326" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::determinism</text>

  <rect x="15" y="339" width="230" height="24" rx="5" fill="#e8eef5"/>
  <text x="130" y="355" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::distributed (MPI sharded)</text>

  <!-- Core submodules -->
  <line x1="350" y1="198" x2="350" y2="220" stroke="#2b5a9a" stroke-width="1"/>

  <rect x="240" y="223" width="220" height="24" rx="5" fill="#e8eef5"/>
  <text x="350" y="239" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::memory (pools, allocators)</text>

  <rect x="240" y="252" width="220" height="24" rx="5" fill="#e8eef5"/>
  <text x="350" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::cpu::simd (dispatch)</text>

  <rect x="240" y="281" width="220" height="24" rx="5" fill="#e8eef5"/>
  <text x="350" y="297" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::threading (work stealing)</text>

  <!-- GPU submodules -->
  <line x1="570" y1="198" x2="570" y2="220" stroke="#4a9a4a" stroke-width="1"/>

  <rect x="460" y="223" width="220" height="24" rx="5" fill="#e8f5e8"/>
  <text x="570" y="239" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4a9a4a">CUDA kernels (92+ files)</text>

  <rect x="460" y="252" width="220" height="24" rx="5" fill="#e8f5e8"/>
  <text x="570" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4a9a4a">nerve::gpu::DeviceMemoryPool</text>

  <rect x="460" y="281" width="220" height="24" rx="5" fill="#e8f5e8"/>
  <text x="570" y="297" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4a9a4a">nerve::distributed::nccl_mpi_bridge</text>

  <!-- Spectral submodules -->
  <line x1="790" y1="198" x2="790" y2="220" stroke="#2b5a9a" stroke-width="1"/>

  <rect x="690" y="223" width="200" height="24" rx="5" fill="#e8eef5"/>
  <text x="790" y="239" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::sheaf</text>

  <rect x="690" y="252" width="200" height="24" rx="5" fill="#e8eef5"/>
  <text x="790" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::graphs</text>

  <!-- Streaming submodules -->
  <line x1="1000" y1="198" x2="1000" y2="220" stroke="#2b5a9a" stroke-width="1"/>

  <rect x="910" y="223" width="180" height="24" rx="5" fill="#e8eef5"/>
  <text x="1000" y="239" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::streaming::lockfree</text>

  <rect x="910" y="252" width="180" height="24" rx="5" fill="#e8eef5"/>
  <text x="1000" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2b5a9a">nerve::streaming::gpu</text>

  <!-- nerve.torch submodules -->
  <line x1="550" y1="142" x2="550" y2="165" stroke="#2b5a9a" stroke-width="1.5"/>

  <rect x="430" y="168" width="240" height="26" rx="6" fill="#e8eef5"/>
  <text x="550" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#2b5a9a">nerve.nn (PyTorch nn layers)</text>

  <rect x="430" y="200" width="240" height="26" rx="6" fill="#e8eef5"/>
  <text x="550" y="217" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#2b5a9a">nerve.diff (differentiable PH)</text>

  <!-- Layer rules box -->
  <rect x="20" y="400" width="1060" height="130" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="425" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Layer Rules</text>

  <circle cx="45" cy="445" r="4" fill="#2b5a9a"/>
  <text x="58" y="449" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">nerve::persistence depends on nerve::algorithms, nerve::algebra, nerve::core  --  never the reverse</text>

  <circle cx="45" cy="465" r="4" fill="#4a9a4a"/>
  <text x="58" y="469" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">nerve::gpu depends on CUDA runtime but not on nerve::persistence</text>

  <circle cx="45" cy="485" r="4" fill="#d97a2b"/>
  <text x="58" y="489" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">nerve::distributed depends on MPI, NCCL, and nerve::persistence</text>

  <circle cx="45" cy="505" r="4" fill="#2b5a9a"/>
  <text x="58" y="509" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">nerve::streaming depends on nerve::persistence and optionally nerve::gpu</text>

  <circle cx="45" cy="525" r="4" fill="#888"/>
  <text x="58" y="529" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">Python modules depend only on nerve_internal and each other, no circular imports</text>
</svg>