<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .title { font-size: 14px; fill: #111; font-weight: bold; }
      .stage-label { font-size: 10px; fill: #fff; font-weight: bold; }
      .time-label { font-size: 10px; fill: #666; }
    </style>
  </defs>

  <text x="20" y="25" class="title">CI Pipeline Stages  --  Every Commit</text>

  <!-- Row 1: Lint -> Build -> Test -->
  <rect x="20" y="50" width="130" height="50" rx="8" fill="#2b5a9a"/>
  <text x="85" y="70" class="stage-label" text-anchor="middle">1. Lint</text>
  <text x="85" y="85" class="stage-label" text-anchor="middle" font-size="9">ruff + clang-tidy</text>
  <text x="85" y="96" class="time-label" text-anchor="middle">&lt; 1 min</text>

  <line x1="150" y1="75" x2="180" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="185" y="50" width="130" height="50" rx="8" fill="#2b5a9a"/>
  <text x="250" y="70" class="stage-label" text-anchor="middle">2. Build</text>
  <text x="250" y="85" class="stage-label" text-anchor="middle" font-size="9">Release + Debug</text>
  <text x="250" y="96" class="time-label" text-anchor="middle">5-15 min</text>

  <line x1="315" y1="75" x2="345" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="350" y="50" width="130" height="50" rx="8" fill="#4a9a4a"/>
  <text x="415" y="67" class="stage-label" text-anchor="middle">3. C++ Unit</text>
  <text x="415" y="82" class="stage-label" text-anchor="middle" font-size="9">41 test files</text>
  <text x="415" y="96" class="time-label" text-anchor="middle">2 min</text>

  <line x1="480" y1="75" x2="510" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="515" y="50" width="150" height="50" rx="8" fill="#4a9a4a"/>
  <text x="590" y="67" class="stage-label" text-anchor="middle">4. CUDA Kernel</text>
  <text x="590" y="82" class="stage-label" text-anchor="middle" font-size="9">4 test files</text>
  <text x="590" y="96" class="time-label" text-anchor="middle">5 min</text>

  <!-- Row 2: More tests -->
  <rect x="20" y="120" width="130" height="50" rx="8" fill="#4a9a4a"/>
  <text x="85" y="137" class="stage-label" text-anchor="middle">5. Python Smoke</text>
  <text x="85" y="152" class="stage-label" text-anchor="middle" font-size="9">7 test files</text>
  <text x="85" y="166" class="time-label" text-anchor="middle">3 min</text>

  <line x1="150" y1="145" x2="180" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="185" y="120" width="130" height="50" rx="8" fill="#4a9a4a"/>
  <text x="250" y="137" class="stage-label" text-anchor="middle">6. Adaptive Accel</text>
  <text x="250" y="152" class="stage-label" text-anchor="middle" font-size="9">10 files</text>
  <text x="250" y="166" class="time-label" text-anchor="middle">8 min</text>

  <line x1="315" y1="145" x2="345" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="350" y="120" width="130" height="50" rx="8" fill="#d97a2b"/>
  <text x="415" y="137" class="stage-label" text-anchor="middle">7. MPI Tests</text>
  <text x="415" y="152" class="stage-label" text-anchor="middle" font-size="9">2 nodes</text>
  <text x="415" y="166" class="time-label" text-anchor="middle">5 min</text>

  <line x1="480" y1="145" x2="510" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="515" y="120" width="150" height="50" rx="8" fill="#d97a2b"/>
  <text x="590" y="137" class="stage-label" text-anchor="middle">8. Determinism</text>
  <text x="590" y="152" class="stage-label" text-anchor="middle" font-size="9">full matrix</text>
  <text x="590" y="166" class="time-label" text-anchor="middle">10 min</text>

  <!-- Row 3: Final checks -->
  <line x1="85" y1="120" x2="85" y2="102" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="250" y1="120" x2="250" y2="102" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="120" x2="415" y2="102" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="590" y1="120" x2="590" y2="102" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Parallel fork after determinism -->
  <rect x="20" y="190" width="300" height="40" rx="8" fill="#e74c3c" opacity="0.85"/>
  <text x="170" y="207" class="stage-label" text-anchor="middle">9. Memory Leak (valgrind)</text>
  <text x="170" y="222" class="stage-label" text-anchor="middle" font-size="9">small test case</text>
  <text x="170" y="233" class="time-label" text-anchor="middle">3 min</text>

  <line x1="590" y1="170" x2="170" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="370" y="190" width="300" height="40" rx="8" fill="#e74c3c" opacity="0.85"/>
  <text x="520" y="207" class="stage-label" text-anchor="middle">10. Performance Regression</text>
  <text x="520" y="222" class="stage-label" text-anchor="middle" font-size="9">benchmark comparison</text>
  <text x="520" y="233" class="time-label" text-anchor="middle">15 min</text>

  <line x1="590" y1="170" x2="520" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>