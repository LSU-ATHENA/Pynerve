<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .title { font-size: 15px; fill: #111; font-weight: bold; }
      .warp-label { font-size: 12px; fill: #fff; font-weight: bold; }
      .shmem-label { font-size: 12px; fill: #333; font-weight: bold; }
      .step-label { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <text x="20" y="25" class="title">Shared-Memory Tree Reduction  --  Cross-Warp Column Accumulation</text>

  <!-- Phase 1: Warp writes to shmem -->
  <text x="20" y="60" class="step-label" font-weight="bold">Phase 1: Each warp writes its partial result to shared memory</text>

  <!-- Warp 0 -->
  <rect x="20" y="75" width="120" height="36" rx="6" fill="#2b5a9a"/>
  <text x="80" y="98" class="warp-label" text-anchor="middle">Warp 0</text>
  <line x1="140" y1="93" x2="195" y2="93" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Warp 1 -->
  <rect x="20" y="125" width="120" height="36" rx="6" fill="#4a9a4a"/>
  <text x="80" y="148" class="warp-label" text-anchor="middle">Warp 1</text>
  <line x1="140" y1="143" x2="195" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Warp 2 -->
  <rect x="20" y="175" width="120" height="36" rx="6" fill="#d97a2b"/>
  <text x="80" y="198" class="warp-label" text-anchor="middle">Warp 2</text>
  <line x1="140" y1="193" x2="195" y2="193" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Warp 3 -->
  <rect x="20" y="225" width="120" height="36" rx="6" fill="#2b5a9a" opacity="0.7"/>
  <text x="80" y="248" class="warp-label" text-anchor="middle">Warp 3</text>
  <line x1="140" y1="243" x2="195" y2="243" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="80" y="290" class="step-label" text-anchor="middle">...</text>

  <!-- Shared memory array -->
  <rect x="200" y="70" width="50" height="36" rx="4" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <text x="225" y="93" class="shmem-label" text-anchor="middle">[0]</text>

  <rect x="250" y="70" width="50" height="36" rx="4" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <text x="275" y="93" class="shmem-label" text-anchor="middle">[1]</text>

  <rect x="300" y="70" width="50" height="36" rx="4" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <text x="325" y="93" class="shmem-label" text-anchor="middle">[2]</text>

  <rect x="350" y="70" width="50" height="36" rx="4" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <text x="375" y="93" class="shmem-label" text-anchor="middle">[3]</text>

  <text x="425" y="93" class="step-label" text-anchor="middle">...</text>

  <!-- Phase 2 label -->
  <text x="20" y="325" class="step-label" font-weight="bold">Phase 2: Synchronize; tree-reduce pairs in shared memory</text>

  <!-- Tree reduction arrows -->
  <line x1="225" y1="106" x2="275" y2="136" stroke="#e74c3c" stroke-width="2"/>
  <line x1="325" y1="106" x2="275" y2="136" stroke="#e74c3c" stroke-width="2"/>
  <line x1="375" y1="106" x2="425" y2="136" stroke="#e74c3c" stroke-width="2"/>

  <!-- Pair reduce boxes -->
  <rect x="225" y="140" width="100" height="36" rx="6" fill="#e74c3c" opacity="0.8"/>
  <text x="275" y="163" class="warp-label" text-anchor="middle" font-size="11">pair reduce</text>
  <line x1="275" y1="176" x2="275" y2="210" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="360" y="140" width="100" height="36" rx="6" fill="#e74c3c" opacity="0.8"/>
  <text x="410" y="163" class="warp-label" text-anchor="middle" font-size="11">pair reduce</text>
  <line x1="410" y1="176" x2="410" y2="210" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Final result -->
  <rect x="225" y="215" width="240" height="40" rx="8" fill="#333"/>
  <text x="345" y="240" class="warp-label" text-anchor="middle" font-size="13">Final Reduction Result</text>

  <text x="20" y="360" class="step-label" fill="#888">Bitwise reproducible  --  fixed reduction tree, no atomicCAS</text>
</svg>