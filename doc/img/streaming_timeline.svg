<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2b5a9a"/></marker>
  </defs>
  <!-- Timeline arrow -->
  <line x1="50" y1="80" x2="810" y2="80" stroke="#2b5a9a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="820" y="84" fill="#2b5a9a" font-weight="bold" font-size="12">time</text>

  <!-- Tick marks -->
  <line x1="100" y1="70" x2="100" y2="90" stroke="#2b5a9a" stroke-width="2"/>
  <text x="100" y="105" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">t₀</text>

  <line x1="300" y1="70" x2="300" y2="90" stroke="#2b5a9a" stroke-width="2"/>
  <text x="300" y="105" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">t₁</text>

  <line x1="500" y1="70" x2="500" y2="90" stroke="#2b5a9a" stroke-width="2"/>
  <text x="500" y="105" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">t₂</text>

  <line x1="730" y1="70" x2="730" y2="90" stroke="#2b5a9a" stroke-width="2"/>
  <text x="730" y="105" text-anchor="middle" fill="#2b5a9a" font-weight="bold" font-size="14">t₃</text>

  <!-- Nodes at each time -->
  <circle cx="100" cy="80" r="6" fill="#d97a2b" stroke="#a65e1f" stroke-width="2"/>
  <circle cx="300" cy="80" r="6" fill="#d97a2b" stroke="#a65e1f" stroke-width="2"/>
  <circle cx="500" cy="80" r="6" fill="#d97a2b" stroke="#a65e1f" stroke-width="2"/>
  <circle cx="730" cy="80" r="6" fill="#4a9a4a" stroke="#2d6e2d" stroke-width="2"/>

  <!-- Label boxes -->
  <rect x="20" y="10" width="160" height="48" rx="6" fill="#fff3cd" stroke="#d97a2b" stroke-width="1.5"/>
  <text x="100" y="28" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">10% data loaded</text>
  <text x="100" y="44" text-anchor="middle" fill="#555" font-size="11">approximate diagram</text>

  <rect x="210" y="120" width="170" height="48" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="295" y="138" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">25% data loaded</text>
  <text x="295" y="154" text-anchor="middle" fill="#555" font-size="11">refined diagram</text>

  <rect x="420" y="10" width="160" height="48" rx="6" fill="#e8f0fa" stroke="#2b5a9a" stroke-width="1.5"/>
  <text x="500" y="28" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">50% data loaded</text>
  <text x="500" y="44" text-anchor="middle" fill="#555" font-size="11">more refined</text>

  <rect x="630" y="120" width="190" height="48" rx="6" fill="#d4edda" stroke="#4a9a4a" stroke-width="1.5"/>
  <text x="725" y="138" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">100% data loaded</text>
  <text x="725" y="154" text-anchor="middle" fill="#555" font-size="11">exact result</text>

  <!-- Connecting lines from nodes to boxes -->
  <line x1="100" y1="58" x2="100" y2="80" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="300" y1="80" x2="300" y2="120" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="500" y1="58" x2="500" y2="80" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="730" y1="80" x2="730" y2="120" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
</svg>