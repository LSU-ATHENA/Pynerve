<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#fafbfc" rx="4"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#333">Nerve Software Stack</text>

  <!-- Layer 1: Python -->
  <rect x="200" y="50" width="400" height="50" rx="8" fill="#2b5a9a"/>
  <text x="400" y="75" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">nerve (public API)</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: nerve_internal -->
  <rect x="200" y="135" width="400" height="50" rx="8" fill="#2b5a9a"/>
  <text x="400" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">nerve_internal (pybind11 extension)</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="185" x2="400" y2="215" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: nerve_core -->
  <rect x="200" y="220" width="400" height="50" rx="8" fill="#2b5a9a"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">nerve_core (core library)</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="270" x2="400" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: CUDA -->
  <rect x="200" y="305" width="400" height="50" rx="8" fill="#4a9a4a"/>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">CUDA: 92+ kernels, cub, cuBLAS, cuSOLVER, cuSPARSE</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0f0e0">compile + link</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="355" x2="400" y2="375" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 5: MPI -->
  <rect x="200" y="380" width="400" height="40" rx="8" fill="#d97a2b"/>
  <text x="400" y="405" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">MPI: MPI_Allgatherv, NCCL, NVSHMEM</text>

  <!-- Arrow 5 -->
  <line x1="400" y1="420" x2="400" y2="435" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 6: SIMD -->
  <rect x="200" y="440" width="400" height="40" rx="8" fill="#d97a2b"/>
  <text x="400" y="465" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">SIMD: AVX-512, AVX2, SSE4.1 (runtime dispatch)</text>
</svg>