package:
  name: pynerve
  version: "{{ environ.get('PYNERVE_VERSION', '1.0.4') }}"

source:
  url: https://github.com/LSU-ATHENA/Pynerve
  git_tag: v{{ version }}
  git_depth: 1

build:
  number: 0
  script:
    - pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake >=3.20
    - ninja
    - scikit-build-core >=0.8
    - pybind11
    - python
  host:
    - python
    - pip
    - numpy >=1.21.0
    - scipy >=1.7.0
  run:
    - python
    - numpy >=1.21.0
    - scipy >=1.7.0

test:
  imports:
    - pynerve
  commands:
    - python -c "import pynerve; print(pynerve.__version__)"

about:
  home: https://github.com/LSU-ATHENA/Pynerve
  license: MIT
  license_file: LICENSE
  summary: Fast TDA library
  description: |
    High-performance framework for Topological Data Analysis (TDA),
    providing persistent homology, filtration construction, topological
    feature extraction, differentiable topology, and large-scale
    computational pipelines through a unified Python and C++ interface.
  doc_url: https://lsu-athena.github.io/Pynerve/
  dev_url: https://github.com/LSU-ATHENA/Pynerve

extra:
  recipe-maintainers:
    - spinxog
